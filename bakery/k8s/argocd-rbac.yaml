apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-freshmart-permissions
  namespace: freshmart
rules:
- apiGroups:
  - build.openshift.io
  resources:
  - buildconfigs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - image.openshift.io
  resources:
  - imagestreams
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - postgres-operator.crunchydata.com
  resources:
  - postgresclusters
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-freshmart-permissions
  namespace: freshmart
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-freshmart-permissions
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
