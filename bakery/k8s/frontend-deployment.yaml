---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvestmart-frontend
  namespace: freshmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harvestmart-frontend
  template:
    metadata:
      labels:
        app: harvestmart-frontend
    spec:
      containers:
        - name: harvestmart-frontend
          image: image-registry.openshift-image-registry.svc:5000/freshmart/harvestmart-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: harvestmart-frontend-service
  namespace: freshmart
spec:
  selector:
    app: harvestmart-frontend
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
