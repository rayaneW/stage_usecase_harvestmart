---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: freshmart
data:
  DB_URL: "jdbc:postgresql://freshmart-primary:5432/freshmart"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bakery-backend
  namespace: freshmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bakery-backend
  template:
    metadata:
      labels:
        app: bakery-backend
    spec:
      # Wait for postgres to be ready before starting
      initContainers:
        - name: download-otel-javaagent
          image: registry.access.redhat.com/ubi9/ubi-minimal:9.6
          command:
            - /bin/sh
            - -c
            - |
              microdnf install -y curl >/dev/null 2>&1
              mkdir -p /agent
              echo Downloading OpenTelemetry Java agent...
              curl -sSL -o /agent/opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v1.27.0/opentelemetry-javaagent.jar
          volumeMounts:
            - name: otel-agent
              mountPath: /agent
      containers:
        - name: bakery-backend
          image: image-registry.openshift-image-registry.svc:5000/freshmart/bakery-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: freshmart-pguser-freshmart
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshmart-pguser-freshmart
                  key: password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION
              value: "true"
            - name: SPRING_SQL_INIT_MODE
              value: always
            - name: INSTANA_AGENT_HOST
              value: "instana-agent.instana-agent.svc"
            - name: INSTANA_AGENT_PORT
              value: "42699"
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel/agent/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector-service:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=bakery-backend"
            - name: OTEL_TRACES_SAMPLER
              value: "always_on"
          volumeMounts:
            - name: otel-agent
              mountPath: /otel/agent
          readinessProbe:
            httpGet:
              path: /products
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: otel-agent
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: bakery-backend-service
  namespace: freshmart
spec:
  selector:
    app: bakery-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: bakery-backend-route
  namespace: freshmart
spec:
  to:
    kind: Service
    name: bakery-backend-service
  port:
    targetPort: http
