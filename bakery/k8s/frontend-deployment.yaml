---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvestmart-frontend
  namespace: freshmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harvestmart-frontend
  template:
    metadata:
      labels:
        app: harvestmart-frontend
    spec:
      containers:
        - name: harvestmart-frontend
          image: harvestmart-frontend:latest
          imagePullPolicy: Never          # use local image built by Docker Desktop
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: harvestmart-frontend-service
  namespace: freshmart
spec:
  selector:
    app: harvestmart-frontend
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000              # Access app at http://localhost:30000
