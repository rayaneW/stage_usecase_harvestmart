---
# Service in instana-agent namespace that redirects to agents in openshift-operators
apiVersion: v1
kind: Service
metadata:
  name: instana-agent
  namespace: instana-agent
spec:
  type: ExternalName
  externalName: instana-agent-headless.openshift-operators.svc.cluster.local
  ports:
  - port: 42699
    targetPort: 42699
    protocol: TCP
    name: agent
