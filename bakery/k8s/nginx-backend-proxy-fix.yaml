apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-backend-proxy-conf
  namespace: freshmart
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        proxy_pass http://bakery-backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-backend-proxy
  namespace: freshmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-backend-proxy
  template:
    metadata:
      labels:
        app: nginx-backend-proxy
    spec:
      volumes:
      - name: nginx-conf
        configMap:
          name: nginx-backend-proxy-conf
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.27.5
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-backend-proxy
  namespace: freshmart
spec:
  ports:
  - name: http
    port: 80
    targetPort: 8080
  selector:
    app: nginx-backend-proxy
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nginx-backend-proxy-route
  namespace: freshmart
spec:
  to:
    kind: Service
    name: nginx-backend-proxy
  port:
    targetPort: http
