---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: freshmart
data:
  DB_URL: "jdbc:postgresql://postgres-service:5432/freshmart"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bakery-backend
  namespace: freshmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bakery-backend
  template:
    metadata:
      labels:
        app: bakery-backend
    spec:
      # Wait for postgres to be ready before starting
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for postgres..."; sleep 2
              done
              echo "Postgres is up!"
      containers:
        - name: bakery-backend
          image: bakery-backend:latest
          imagePullPolicy: Never          # use local image built by Docker Desktop
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /products
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bakery-backend-service
  namespace: freshmart
spec:
  selector:
    app: bakery-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
