---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvestmart-frontend
  namespace: freshmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harvestmart-frontend
  template:
    metadata:
      labels:
        app: harvestmart-frontend
    spec:
      containers:
        - name: harvestmart-frontend
          image: harvestmart-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: INSTANA_EUM_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-instana-eum
                  key: INSTANA_EUM_KEY
                  optional: true
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: harvestmart-frontend-service
  namespace: freshmart
spec:
  selector:
    app: harvestmart-frontend
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
