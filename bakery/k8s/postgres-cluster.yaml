apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: freshmart
  namespace: freshmart
spec:
  postgresVersion: 16
  users:
    - name: freshmart
      databases:
        - freshmart
  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
